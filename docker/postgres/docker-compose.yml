version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: crawlbrief-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crawlbrief}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-crawlbrief}
    volumes:
      # Store data on host for easy backup and persistence
      - ${POSTGRES_DATA_DIR:-./data}:/var/lib/postgresql/data
    ports:
      # Use 5433 to avoid conflict with Firecrawl's PostgreSQL on 5432
      - '127.0.0.1:5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-crawlbrief}']
      interval: 10s
      timeout: 5s
      retries: 5
