services:
  postgres:
    image: postgres:15-alpine
    container_name: crawlbrief-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crawlbrief}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-crawlbrief}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-crawlbrief}']
      interval: 10s
      timeout: 5s
      retries: 5

  crawlbrief:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: crawlbrief
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '127.0.0.1:${CRAWLBRIEF_PORT:-3001}:3001'
    environment:
      - NODE_ENV=production
      - CRAWLBRIEF_PORT=3001
      - CRAWLBRIEF_BASE_URL=${CRAWLBRIEF_BASE_URL}
      - CRAWLBRIEF_DATABASE_URL=postgresql://${POSTGRES_USER:-crawlbrief}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-crawlbrief}
      - CRAWLBRIEF_GATEWAY_URL=${CRAWLBRIEF_GATEWAY_URL}
      - CRAWLBRIEF_GATEWAY_TOKEN=${CRAWLBRIEF_GATEWAY_TOKEN}
      - CRAWLBRIEF_LLM_PROVIDER=${CRAWLBRIEF_LLM_PROVIDER:-openai}
      - CRAWLBRIEF_OPENAI_API_KEY=${CRAWLBRIEF_OPENAI_API_KEY}
      - CRAWLBRIEF_OPENAI_MODEL=${CRAWLBRIEF_OPENAI_MODEL:-gpt-4o-mini}
      - CRAWLBRIEF_ANTHROPIC_API_KEY=${CRAWLBRIEF_ANTHROPIC_API_KEY}
      - CRAWLBRIEF_ANTHROPIC_MODEL=${CRAWLBRIEF_ANTHROPIC_MODEL:-claude-3-haiku-20240307}
      - CRAWLBRIEF_AZURE_MODEL_URL=${CRAWLBRIEF_AZURE_MODEL_URL}
      - CRAWLBRIEF_AZURE_MODEL_KEY=${CRAWLBRIEF_AZURE_MODEL_KEY}
      - CRAWLBRIEF_AZURE_MODEL=${CRAWLBRIEF_AZURE_MODEL}
      - CRAWLBRIEF_CF_AI_GATEWAY_URL=${CRAWLBRIEF_CF_AI_GATEWAY_URL}
      - CRAWLBRIEF_CF_AI_GATEWAY_TOKEN=${CRAWLBRIEF_CF_AI_GATEWAY_TOKEN}
      - CRAWLBRIEF_CF_AI_GATEWAY_USE_BYOK=${CRAWLBRIEF_CF_AI_GATEWAY_USE_BYOK:-false}
      - CRAWLBRIEF_SLACK_BOT_TOKEN=${CRAWLBRIEF_SLACK_BOT_TOKEN}
      - CRAWLBRIEF_SLACK_CHANNEL_ID=${CRAWLBRIEF_SLACK_CHANNEL_ID}
      - CRAWLBRIEF_API_TOKEN=${CRAWLBRIEF_API_TOKEN}
      - CRAWLBRIEF_WEBHOOK_SECRET=${CRAWLBRIEF_WEBHOOK_SECRET}
      - CRAWLBRIEF_LOG_LEVEL=${CRAWLBRIEF_LOG_LEVEL:-info}
      - CRAWLBRIEF_TIMEZONE=${CRAWLBRIEF_TIMEZONE:-Pacific/Auckland}
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3001/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
