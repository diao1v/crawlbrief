version: '3.8'

services:
  crawlbrief:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: crawlbrief
    restart: unless-stopped
    # Use host network to connect to PostgreSQL on host's localhost:5432
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '127.0.0.1:${CRAWLBRIEF_PORT:-3001}:3001'
    environment:
      - NODE_ENV=production
      - CRAWLBRIEF_PORT=3001
      - CRAWLBRIEF_BASE_URL=${CRAWLBRIEF_BASE_URL}
      - CRAWLBRIEF_DATABASE_URL=${CRAWLBRIEF_DATABASE_URL}
      - CRAWLBRIEF_GATEWAY_URL=${CRAWLBRIEF_GATEWAY_URL}
      - CRAWLBRIEF_GATEWAY_TOKEN=${CRAWLBRIEF_GATEWAY_TOKEN}
      - CRAWLBRIEF_LLM_PROVIDER=${CRAWLBRIEF_LLM_PROVIDER:-openai}
      - CRAWLBRIEF_OPENAI_API_KEY=${CRAWLBRIEF_OPENAI_API_KEY}
      - CRAWLBRIEF_OPENAI_MODEL=${CRAWLBRIEF_OPENAI_MODEL:-gpt-4o-mini}
      - CRAWLBRIEF_ANTHROPIC_API_KEY=${CRAWLBRIEF_ANTHROPIC_API_KEY}
      - CRAWLBRIEF_ANTHROPIC_MODEL=${CRAWLBRIEF_ANTHROPIC_MODEL:-claude-3-haiku-20240307}
      - CRAWLBRIEF_CF_AI_GATEWAY_URL=${CRAWLBRIEF_CF_AI_GATEWAY_URL}
      - CRAWLBRIEF_CF_AI_GATEWAY_TOKEN=${CRAWLBRIEF_CF_AI_GATEWAY_TOKEN}
      - CRAWLBRIEF_CF_AI_GATEWAY_USE_BYOK=${CRAWLBRIEF_CF_AI_GATEWAY_USE_BYOK:-true}
      - CRAWLBRIEF_SLACK_BOT_TOKEN=${CRAWLBRIEF_SLACK_BOT_TOKEN}
      - CRAWLBRIEF_SLACK_CHANNEL_ID=${CRAWLBRIEF_SLACK_CHANNEL_ID}
      - CRAWLBRIEF_API_TOKEN=${CRAWLBRIEF_API_TOKEN}
      - CRAWLBRIEF_WEBHOOK_SECRET=${CRAWLBRIEF_WEBHOOK_SECRET}
      - CRAWLBRIEF_LOG_LEVEL=${CRAWLBRIEF_LOG_LEVEL:-info}
      - CRAWLBRIEF_TIMEZONE=${CRAWLBRIEF_TIMEZONE:-Pacific/Auckland}
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3001/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
