version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: crawlbrief-postgres
    environment:
      POSTGRES_USER: crawlbrief
      POSTGRES_PASSWORD: crawlbrief
      POSTGRES_DB: crawlbrief
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U crawlbrief']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
